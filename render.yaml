databases:
  - name: jurisday-db
    plan: starter
    region: oregon

services:
  - type: web
    name: jurisday-api
    env: docker
    plan: starter
    dockerfilePath: Dockerfile
    healthCheckPath: /docs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jurisday-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ALLOWED_ORIGINS
        value: https://jurisday.onrender.com
      - key: TRIAL_DIAS
        value: "7"
      # Defina no painel do Render ou via render.yaml (não commit secrets):
      # - GOOGLE_GENAI_KEY
      # - JWT_SECRET
      # - PAGARME_API_KEY
      # - MAIL_HOST, MAIL_PORT, MAIL_USER, MAIL_PASS, MAIL_FROM, MAIL_TO
